<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<script>!function(){var e=localStorage.getItem('ti_theme');e||(e=matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',e)}()</script>
<title>topindex | top hacker news posts — today</title>
<style>
.title-subtitle a { color: inherit; text-decoration: none; }
.title-subtitle a:hover { color: var(--accent); }
</style>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-R2H3DBGJZJ"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-R2H3DBGJZJ');
</script>
</head>
<body>

<div class="title-bar">
    <h1><a href="/" class="home-link">topindex</a> <span class="title-sep">|</span> <span class="title-subtitle"><a href="./">top hacker news posts</a> — today</span></h1>
    <button class="theme-toggle" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
</div>
<div class="header">
    <div class="controls">
        <div class="control-group">
            <label>Top:</label>
            <button data-topn="1" onclick="setTopN(1)">1</button>
            <button data-topn="3" onclick="setTopN(3)">3</button>
            <button data-topn="5" class="active" onclick="setTopN(5)">5</button>
            <button data-topn="10" onclick="setTopN(10)">10</button>
        </div>
        <a href="index.html" class="nav-link" title="Historical archive">Archive</a>
        <button id="refresh-button" class="nav-link" onclick="fetchAll(true)" title="Refresh data" style="cursor:pointer;border:none;font-family:inherit;">&#x21bb; Refresh</button>
    </div>
    <div class="last-updated" id="last-updated"></div>
</div>

<div id="loading" style="display:none">Loading...</div>
<div id="content"></div>

<button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">
    <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
</button>

<div class="tooltip" id="tooltip"></div>

<script>
let currentTopN = 5;
let currentSort = 'score';
let todayStories = [];
let weekStories = [];
let lastFetchTimestamp = null;
const VALID_SORTS = ['score', 'comments', 'date'];
const REFRESH_INTERVAL = 5 * 60 * 1000;
const CACHE_TTL = 6 * 60 * 60 * 1000;
const CACHE_KEY_TODAY = 'hn_top_today_cache';
const CACHE_KEY_WEEK = 'hn_top_week_cache';
const VISITED_LINK_SELECTOR = 'a[data-link="ext"], a[data-link="hn"], a[data-link="arc"]';

/* Theme */
function initTheme() {
    const saved = localStorage.getItem('ti_theme');
    if (saved) {
        document.documentElement.dataset.theme = saved;
    } else {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.dataset.theme = prefersDark ? 'dark' : 'light';
    }
}

function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.dataset.theme === 'dark';
    html.dataset.theme = isDark ? 'light' : 'dark';
    localStorage.setItem('ti_theme', html.dataset.theme);
}

initTheme();

/* Helpers */
function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function extractDomain(url) {
    if (!url) return '';
    try {
        let d = url.replace(/^https?:\/\//, '').split('/')[0];
        return d.replace(/^www\./, '');
    } catch(e) {
        return '';
    }
}

function openAllLinks(sectionId, linkType) {
    const section = document.getElementById(sectionId);
    if (!section) return;
    const selector = 'a[data-link="' + linkType + '"]';
    const links = section.querySelectorAll(selector);
    if (linkType === 'ext') {
        const visited = JSON.parse(localStorage.getItem('hn_visited') || '{}');
        links.forEach(a => {
            window.open(a.href, '_blank');
            a.classList.add('visited');
            visited[a.href] = true;
        });
        localStorage.setItem('hn_visited', JSON.stringify(visited));
    } else {
        links.forEach(a => window.open(a.href, '_blank'));
    }
}

function setRefreshLoading(isLoading) {
    const button = document.getElementById('refresh-button');
    if (!button) return;
    button.disabled = isLoading;
    button.setAttribute('aria-busy', isLoading ? 'true' : 'false');
    button.textContent = isLoading ? 'Loading...' : '\u21bb Refresh';
}

function timeAgo(dateStr) {
    const now = Date.now();
    const then = new Date(dateStr).getTime();
    const diff = Math.floor((now - then) / 1000);
    if (diff < 60) return diff + 's ago';
    if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
    if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
    return Math.floor(diff / 86400) + 'd ago';
}

/* Cache */
function getCache(key) {
    try {
        const raw = localStorage.getItem(key);
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (!cached || !cached.data || !cached.timestamp) return null;
        if (Date.now() - cached.timestamp > CACHE_TTL) {
            localStorage.removeItem(key);
            return null;
        }
        return cached;
    } catch (e) {
        localStorage.removeItem(key);
        return null;
    }
}

function setCache(key, data) {
    try {
        localStorage.setItem(key, JSON.stringify({ data: data, timestamp: Date.now() }));
    } catch (e) {}
}

/* Data */
function buildApiUrl(timeRangeSeconds, hitsPerPage, page) {
    const cutoff = Math.floor(Date.now() / 1000) - timeRangeSeconds;
    return 'https://hn.algolia.com/api/v1/search?tags=story&numericFilters=created_at_i>' + cutoff + '&hitsPerPage=' + hitsPerPage + '&page=' + page;
}

function normalizeHits(hits) {
    return hits.map(hit => ({
        id: hit.objectID,
        title: hit.title,
        url: hit.url,
        score: hit.points || 0,
        comments: hit.num_comments || 0,
        author: hit.author,
        created_at: hit.created_at
    }));
}

async function fetchFeed(cacheKey, timeRangeSeconds, totalHits) {
    const cached = getCache(cacheKey);
    if (cached) return cached;
    const perPage = Math.min(totalHits, 1000);
    const pages = Math.ceil(totalHits / perPage);
    const fetches = [];
    for (let p = 0; p < pages; p++) {
        fetches.push(fetch(buildApiUrl(timeRangeSeconds, perPage, p)).then(r => {
            if (!r.ok) throw new Error('API request failed');
            return r.json();
        }));
    }
    const results = await Promise.all(fetches);
    let allHits = [];
    for (const data of results) allHits = allHits.concat(data.hits);
    const stories = normalizeHits(allHits);
    setCache(cacheKey, stories);
    return { data: stories, timestamp: Date.now() };
}

async function fetchAll(forceRefresh) {
    const loadingEl = document.getElementById('loading');
    const hadData = todayStories.length > 0 || weekStories.length > 0;
    if (forceRefresh || !hadData) loadingEl.style.display = 'block';
    setRefreshLoading(!!forceRefresh);

    if (forceRefresh) {
        localStorage.removeItem(CACHE_KEY_TODAY);
        localStorage.removeItem(CACHE_KEY_WEEK);
    }

    try {
        const [todayResult, weekResult] = await Promise.all([
            fetchFeed(CACHE_KEY_TODAY, 86400, 200),
            fetchFeed(CACHE_KEY_WEEK, 604800, 2000)
        ]);
        todayStories = todayResult.data;
        weekStories = weekResult.data;
        lastFetchTimestamp = Math.min(todayResult.timestamp, weekResult.timestamp);
        loadingEl.style.display = 'none';
        setRefreshLoading(false);
        updateLastUpdated();
        render();
    } catch (e) {
        loadingEl.style.display = 'none';
        setRefreshLoading(false);
        if (!hadData) {
            document.getElementById('content').innerHTML =
                '<p style="text-align:center;color:var(--text-faint);padding:40px;">Failed to load data from Algolia API.</p>';
        }
    }
}

function formatUpdatedTime(timestamp) {
    const d = timestamp ? new Date(timestamp) : new Date();
    const h = d.getHours();
    const m = String(d.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return h12 + ':' + m + ' ' + ampm;
}

function updateLastUpdated() {
    const el = document.getElementById('last-updated');
    if (el) el.textContent = 'Updated ' + formatUpdatedTime(lastFetchTimestamp);
}

/* Sort & Filter */
function sortStories(items) {
    const sorted = items.slice();
    if (currentSort === 'comments') {
        sorted.sort((a, b) => b.comments - a.comments);
    } else if (currentSort === 'date') {
        sorted.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    } else {
        sorted.sort((a, b) => b.score - a.score);
    }
    return sorted;
}

function setTopN(n) {
    currentTopN = n;
    document.querySelectorAll('[data-topn]').forEach(b => {
        b.classList.toggle('active', parseInt(b.dataset.topn) === n);
    });
    render();
}

function setSort(key) {
    if (VALID_SORTS.includes(key)) {
        currentSort = key;
        render();
    }
}

function sortArrow(key) {
    return currentSort === key ? ' \u25BC' : '';
}

/* Render */
function renderSection(label, sectionId, items) {
    const topItems = sortStories(items).slice(0, currentTopN);
    let html = '<div class="year-section"><details open id="' + sectionId + '"><summary><span class="year-label">' + label + '</span></summary>';
    html += '<div class="mobile-actions">';
    html += '<button onclick="openAllLinks(\'' + sectionId + '\', \'hn\')">open all hn</button>';
    html += '<button onclick="openAllLinks(\'' + sectionId + '\', \'ext\')">open all links</button>';
    html += '<button onclick="openAllLinks(\'' + sectionId + '\', \'arc\')">open all archives</button>';
    html += '</div>';
    html += '<table>';
    html += '<thead><tr>';
    html += '<th class="col-score sortable' + (currentSort === 'score' ? ' sort-active' : '') + '" onclick="setSort(\'score\')">points' + sortArrow('score') + '</th>';
    html += '<th class="col-comments sortable' + (currentSort === 'comments' ? ' sort-active' : '') + '" onclick="setSort(\'comments\')"><span class="th-label">cmts' + sortArrow('comments') + '</span> <span class="open-all" onclick="event.stopPropagation();openAllLinks(\'' + sectionId + '\', \'hn\')">open all</span></th>';
    html += '<th><span class="open-all" onclick="openAllLinks(\'' + sectionId + '\', \'ext\')">open all</span></th>';
    html += '<th class="col-archived"><span class="open-all" onclick="openAllLinks(\'' + sectionId + '\', \'arc\')">open all</span></th>';
    html += '<th class="col-user"></th>';
    html += '<th class="col-date sortable' + (currentSort === 'date' ? ' sort-active' : '') + '" onclick="setSort(\'date\')">date' + sortArrow('date') + '</th>';
    html += '<th class="col-when">when</th>';
    html += '</tr></thead><tbody>';

    for (const item of topItems) {
        const hnUrl = 'https://news.ycombinator.com/item?id=' + item.id;
        const domain = extractDomain(item.url);
        const articleUrl = item.url || hnUrl;
        const title = escapeHtml(item.title);
        const archivedUrl = item.url ? 'https://web.archive.org/web/0/' + item.url : '';
        const user = item.author || '';
        const userUrl = user ? 'https://news.ycombinator.com/user?id=' + encodeURIComponent(user) : '';
        const ago = timeAgo(item.created_at);

        html += '<tr class="post-row">';
        html += '<td class="col-score">' + item.score.toLocaleString() + '</td>';
        html += '<td class="col-comments"><a href="' + hnUrl + '" data-link="hn" target="_blank">' + item.comments.toLocaleString() + '</a></td>';
        html += '<td class="col-title"><a href="' + escapeHtml(articleUrl) + '" data-link="ext" target="_blank">' + title + '</a>';
        if (domain) html += ' <span class="domain">(' + escapeHtml(domain) + ')</span>';
        html += '</td>';
        html += '<td class="col-archived">' + (archivedUrl ? '<a href="' + escapeHtml(archivedUrl) + '" data-link="arc" target="_blank">[archived]</a>' : '') + '</td>';
        html += '<td class="col-user">' + (user ? '<a href="' + userUrl + '" target="_blank">' + escapeHtml(user) + '</a>' : '') + '</td>';
        const postDate = item.created_at ? item.created_at.split('T')[0] : '';
        html += '<td class="col-date">' + postDate + '</td>';
        html += '<td class="col-when">' + ago + '</td>';
        html += '</tr>';
    }

    html += '</tbody></table></details></div>';
    return html;
}

function render() {
    if (todayStories.length === 0 && weekStories.length === 0) return;
    let html = '';
    html += renderSection('Top Today', 'today-section', todayStories);
    html += renderSection('Top This Week', 'week-section', weekStories);
    document.getElementById('content').innerHTML = html;
    restoreVisitedLinks();
}

/* Visited links */
function restoreVisitedLinks() {
    const visited = JSON.parse(localStorage.getItem('hn_visited') || '{}');
    document.querySelectorAll(VISITED_LINK_SELECTOR).forEach(a => {
        if (visited[a.href]) a.classList.add('visited');
    });
}
document.addEventListener('mousedown', function(e) {
    if (e.button === 2) return;
    const a = e.target.closest(VISITED_LINK_SELECTOR);
    if (!a) return;
    const visited = JSON.parse(localStorage.getItem('hn_visited') || '{}');
    a.classList.add('visited');
    visited[a.href] = true;
    localStorage.setItem('hn_visited', JSON.stringify(visited));
});

/* Init */
document.addEventListener('DOMContentLoaded', function() {
    fetchAll(false);
    setInterval(function() { fetchAll(false); }, REFRESH_INTERVAL);
});
</script>
</body>
</html>
