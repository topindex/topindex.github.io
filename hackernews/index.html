<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="style.css">
<title>topindex | top hacker news posts</title>
<style>
.title-main { color: var(--text-heading); text-decoration: none; }
.title-main:hover { color: var(--accent); }
.title-subtitle { font-weight: 400; font-size: 0.85em; }
.title-subtitle a { color: inherit; text-decoration: none; }
.title-subtitle a:hover { color: var(--accent); }
</style>
</head>
<body>

<div class="header">
    <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn" title="Toggle dark/light mode"></button>
    <h1><a href="/" class="title-main">topindex</a> <span class="title-subtitle">| <a href="./">top hacker news posts</a></span></h1>
    <div class="controls">
        <div class="control-group">
            <label>Interval:</label>
            <button data-interval="weekly" onclick="setInterval_('weekly')">1w</button>
            <button data-interval="monthly" class="active" onclick="setInterval_('monthly')">1m</button>
            <button data-interval="yearly" onclick="setInterval_('yearly')">1y</button>
            <button data-interval="10y" onclick="setInterval_('10y')">10y</button>
            <button data-interval="all" onclick="setInterval_('all')">all</button>
        </div>
        <div class="control-group">
            <label>Top:</label>
            <button data-topn="1" onclick="setTopN(1)">1</button>
            <button data-topn="3" onclick="setTopN(3)">3</button>
            <button data-topn="5" class="active" onclick="setTopN(5)">5</button>
            <button data-topn="10" onclick="setTopN(10)">10</button>
        </div>
        <a href="today.html" class="nav-link" title="Live front page">Live</a>
    </div>
    <div class="last-updated" id="last-updated"></div>
</div>

<div id="loading" style="display:none">Loading...</div>
<div id="content"></div>
<div id="timeline"></div>
<div id="tl-tooltip"></div>

<button class="back-to-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Back to top">
    <svg viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
</button>
<button class="fab" id="fab" onclick="toggleExpandCollapse()" title="Expand/Collapse All">
    <svg id="fab-expand" viewBox="0 0 24 24"><path d="M12 5.83L15.17 9l1.41-1.41L12 3 7.41 7.59 8.83 9 12 5.83zm0 12.34L8.83 15l-1.41 1.41L12 21l4.59-4.59L15.17 15 12 18.17z"/></svg>
    <svg id="fab-collapse" style="display:none" viewBox="0 0 24 24"><path d="M7.41 18.59L8.83 20 12 16.83 15.17 20l1.41-1.41L12 14l-4.59 4.59zm9.18-13.18L15.17 4 12 7.17 8.83 4 7.41 5.41 12 10l4.59-4.59z"/></svg>
</button>

<div class="tooltip" id="tooltip"></div>

<script src="app.js"></script>
</body>
</html>
